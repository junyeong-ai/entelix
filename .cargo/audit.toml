# cargo-audit ignore list — rationale + time-boxed expiry live in
# `deny.toml [advisories]`. cargo-audit does not honour `expires`
# fields, so the canonical tripwire is the cargo-deny side; this
# file is the bare ID mirror to keep `cargo audit` quiet on the
# same set. Drift between the two is reviewer-rejected — every
# entry here must have a matching entry in `deny.toml` with the
# rationale and the quarterly expiry date.

[advisories]
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0134",
    "RUSTSEC-2026-0118",
]
