# cargo-audit ignore list — rationale lives in `deny.toml [advisories]`.
# Keep this file's IDs in lockstep with deny.toml's ignore array; the
# supply-chain CI gate runs both tools and either out-of-sync would
# surface as a noisy contradiction.

[advisories]
ignore = [
    "RUSTSEC-2023-0071",  # rsa Marvin sidechannel — sqlx-mysql transitive, no MySQL connection ever opens
    "RUSTSEC-2026-0118",  # hickory NSEC3 unbounded loop — no upstream fix; SsrfSafeDnsResolver discards NSEC3
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained — qdrant-client 1.17 transitive via tonic 0.12
]
