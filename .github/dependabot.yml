version: 2
updates:
  # GitHub Actions — major-version pins (`@vN`) move forward when upstream
  # cuts a new major. `cooldown` blocks day-zero adoption (yank window).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 3

  # Workspace cargo dependencies. semver-tiered cooldown — majors get a
  # 14-day yank window, minors 5, patches 2. Security updates bypass
  # cooldown by Dependabot policy, so CVE patches still land immediately.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2

  # xtask is a sibling sub-workspace (`[workspace]` at xtask/Cargo.toml) —
  # the root entry does not cover it, hence a second entry.
  - package-ecosystem: cargo
    directory: /xtask
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 5
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2
