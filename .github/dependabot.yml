version: 2
updates:
  # GitHub Actions — pinned `@v6` / `@v2` move forward as upstream cuts new majors.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # Cargo dependencies — workspace root + xtask sub-workspace.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /xtask
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch
