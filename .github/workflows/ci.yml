name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast pre-flight: fmt + every static-analysable invariant.
  # `cargo xtask invariants` runs every gate that doesn't require network
  # or heavy cargo subprocesses; per-invariant predicates live under
  # xtask/src/invariants/.
  preflight:
    name: preflight (fmt + invariants)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: preflight
          workspaces: xtask -> target
      - run: cargo fmt --all -- --check
      - run: cargo xtask invariants

  supply-chain:
    name: supply-chain (audit + deny)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: supply-chain
          workspaces: xtask -> target
      - uses: taiki-e/install-action@v2.77.4
        with:
          tool: cargo-audit,cargo-deny
      - run: cargo xtask supply-chain

  build:
    name: build (${{ matrix.os }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.os }}
      - uses: taiki-e/install-action@v2.77.4
        with:
          tool: cargo-nextest
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - run: cargo build --workspace --all-features
      # Bare `cargo build --examples` (no features) catches an example that
      # imports a feature-gated facade item without declaring required-features
      # in Cargo.toml. The --all-features build above can't catch this —
      # every gate is satisfied by accident.
      - run: cargo build --examples -p entelix
      - run: cargo nextest run --workspace --all-features --no-fail-fast
      # nextest does not run doctests — `--doc` covers them.
      - run: cargo test --workspace --all-features --doc

  docs:
    name: docs (rustdoc -D warnings)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs
      - run: cargo doc --workspace --all-features --no-deps

  feature-matrix:
    name: feature-matrix
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: feature-matrix
          workspaces: |
            . -> target
            xtask -> target
      - run: cargo xtask feature-matrix

  # `cargo public-api` shells out to nightly rustdoc for --output-format=json;
  # stable cannot satisfy that. Install nightly alongside the pinned stable so
  # `cargo xtask public-api` invokes +nightly transparently.
  public-api:
    name: public-api drift
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - run: rustup toolchain install nightly --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: public-api
          workspaces: |
            . -> target
            xtask -> target
      - uses: taiki-e/install-action@v2.77.4
        with:
          tool: cargo-public-api
      - run: cargo xtask public-api
