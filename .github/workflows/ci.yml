name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast pre-flight: fmt + every static-analysable invariant ───────────────
  # `cargo xtask invariants` runs every gate that doesn't require network or
  # heavy cargo subprocesses. Each gate is a typed-AST visitor — see ADR-0073
  # and `xtask/src/invariants/` for the per-invariant predicates.
  preflight:
    name: preflight (fmt + invariants)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (rustfmt only)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: xtask
          workspaces: xtask

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo xtask invariants
        run: cargo xtask invariants

  # ── Supply-chain — cargo audit + cargo deny ────────────────────────────────
  supply-chain:
    name: supply-chain (cargo audit + cargo deny)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest
      - name: Install cargo-audit + cargo-deny
        run: cargo install cargo-audit cargo-deny --locked --quiet
      - name: cargo xtask supply-chain
        run: cargo xtask supply-chain

  # ── Build + clippy + test matrix ───────────────────────────────────────────
  build:
    name: build (${{ matrix.os }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}

      - name: cargo clippy --workspace --all-features
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

      - name: cargo build --workspace --all-features
        run: cargo build --workspace --all-features

      # Bare `cargo build --examples` (no features) catches an
      # example that imports a feature-gated facade item without
      # declaring `required-features` in `Cargo.toml`. With the
      # declaration, Cargo silently skips the example; without it,
      # the build fails with E0432 unresolved import. The
      # `--all-features` build above can't catch this — every gate
      # is satisfied by accident. ADR-0094.
      - name: cargo build --examples -p entelix (no-features regression gate)
        run: cargo build --examples -p entelix

      - name: cargo test --workspace --all-features (excluding ignored)
        run: cargo test --workspace --all-features --no-fail-fast

  # ── Doc build (rustdoc warnings denied) ────────────────────────────────────
  docs:
    name: docs (rustdoc -D warnings)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest
      - name: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps

  # ── Facade feature isolation matrix ────────────────────────────────────────
  feature-matrix:
    name: feature-matrix (each facade feature compiles alone)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest
      - name: cargo xtask feature-matrix
        run: cargo xtask feature-matrix

  # ── Public-API drift gate (requires cargo-public-api) ──────────────────────
  public-api:
    name: public-API drift
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest
      - name: Install cargo-public-api
        run: cargo install cargo-public-api --locked --quiet
      - name: cargo xtask public-api
        run: cargo xtask public-api

  # ── Live integration tests (opt-in; requires API keys) ─────────────────────
  # Triggered only on workflow_dispatch or when the commit message contains
  # `[live]`. Costs real money — `--ignored` tests hit the live vendor APIs.
  live:
    name: live integration (--ignored)
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[live]')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest
      - name: cargo test --workspace --all-features -- --ignored
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: cargo test --workspace --all-features -- --ignored
